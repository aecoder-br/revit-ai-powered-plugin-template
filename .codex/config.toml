# Generated Codex adapter config. Source: .agents/roster.json, .agents/skills/*/SKILL.md, and .agents/workflows/*.md.
# Codex should use .agents/skills as the canonical skill layer for this repository.
# Do not assume Codex reads .codex/agents/*.md; this file only defines conservative defaults and profiles.
# Keep permissions restricted. Do not enable destructive execution, broad filesystem access, or automatic network access by default.

model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
multi_agent = true

